<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Belal Fathy terminal banner">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6322EE"/>
      <stop offset="100%" stop-color="#1a0a3d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="#0d1117"/>

  <!-- terminal window -->
  <rect x="150" y="45" width="900" height="210" rx="12" fill="#161b22" stroke="#6322EE" stroke-width="2"/>
  <!-- title bar -->
  <rect x="150" y="45" width="900" height="38" rx="12" fill="#1c2333"/>
  <rect x="150" y="70" width="900" height="13" fill="#1c2333"/>
  <circle cx="178" cy="64" r="6" fill="#ff5f56"/>
  <circle cx="200" cy="64" r="6" fill="#ffbd2e"/>
  <circle cx="222" cy="64" r="6" fill="#27c93f"/>
  <text x="600" y="69" text-anchor="middle" font-family="Fira Code, monospace" font-size="13" fill="#8b949e">belal@nomeda: ~</text>

  <!-- terminal text -->
  <text x="180" y="130" font-family="Fira Code, monospace" font-size="20" fill="#c9d1d9">
    <tspan fill="#9B6DFF">$</tspan> whoami
  </text>
  <text x="180" y="168" font-family="Fira Code, monospace" font-size="30" font-weight="700" fill="#ffffff">Belal Fathy</text>
  <text x="180" y="205" font-family="Fira Code, monospace" font-size="19" fill="#6322EE">
    <tspan fill="#9B6DFF">&gt;</tspan> AI Engineer &amp; Researcher
  </text>
  <text x="180" y="238" font-family="Fira Code, monospace" font-size="16" fill="#8b949e">
    <tspan fill="#9B6DFF">&gt;</tspan> NLP · LLM Fine-tuning · Deep Learning<tspan fill="#ffffff" font-size="20">_</tspan>
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </text>
</svg>
